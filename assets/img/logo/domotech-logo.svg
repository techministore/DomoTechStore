<svg width="600" height="170" viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradiente para un look premium -->
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    
    <!-- Filtro de brillo para el botón de encendido -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ICONO -->
  <g transform="translate(30,30)">
    <!-- Silueta de la Casa (Líneas modernas y gruesas) -->
    <path d="M50 5 L10 40 V95 H90 V40 Z" 
          fill="none" 
          stroke="url(#blue-gradient)" 
          stroke-width="8" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>

    <!-- BOTÓN DE ENCENDIDO (POWER BUTTON) -->
    <g transform="translate(50,55)" filter="url(#glow)">
      <!-- Círculo incompleto del botón de Power -->
      <path d="M-15 -15 A 22 22 0 1 0 15 -15" 
            fill="none" 
            stroke="#fff" 
            stroke-width="7" 
            stroke-linecap="round"/>
      <!-- Línea vertical del botón de Power -->
      <line x1="0" y1="-25" x2="0" y2="-5" 
            stroke="#fff" 
            stroke-width="7" 
            stroke-linecap="round"/>
    </g>

    <!-- Ondas WiFi integradas en el tejado -->
    <path d="M70 15 Q85 5 100 15" fill="none" stroke="url(#blue-gradient)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M75 25 Q85 18 95 25" fill="none" stroke="url(#blue-gradient)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- TEXTO PRINCIPAL -->
  <text x="150" y="85"
        font-family="'Inter', system-ui, sans-serif"
        font-size="52"
        font-weight="900"
        fill="#ffffff">
    DomoTech<tspan fill="url(#blue-gradient)">Store</tspan>
  </text>

  <!-- SUBTÍTULO CON SEPARACIÓN -->
  <text x="150" y="125"
        font-family="'Inter', system-ui, sans-serif"
        font-size="16"
        font-weight="600"
        letter-spacing="6"
        fill="#94a3b8"
        text-transform="uppercase">
    Smart Home Solutions
  </text>
</svg>
