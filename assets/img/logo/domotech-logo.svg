<svg width="600" height="170" viewBox="0 0 600 170" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blue-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00aaff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
  </defs>

  <!-- ICONO -->
  <g transform="translate(20,20)" stroke="url(#blue-gradient)" stroke-width="4" fill="none">

    <!-- Casa -->
    <path d="M40 25 L5 55 V115 H75 V55 Z" stroke-linejoin="round"/>

    <!-- Botón ON (línea + círculo) -->
    <line x1="40" y1="50" x2="40" y2="35" stroke-width="4" stroke-linecap="round"/>
    <circle cx="40" cy="75" r="18" stroke-width="4"/>

    <!-- WiFi saliendo por encima del tejado -->
    <path d="M20 5 Q40 -10 60 5" stroke-width="3" stroke-linecap="round"/>
    <path d="M25 12 Q40 -2 55 12" stroke-width="3" stroke-linecap="round"/>
    <path d="M30 19 Q40 4 50 19" stroke-width="3" stroke-linecap="round"/>

  </g>

  <!-- TEXTO PRINCIPAL -->
  <text x="120" y="80"
        font-family="Inter, system-ui, sans-serif"
        font-size="44"
        font-weight="800"
        fill="url(#blue-gradient)">
    DomoTechStore
  </text>

  <!-- SUBTÍTULO -->
  <text x="120" y="120"
        font-family="Inter, system-ui, sans-serif"
        font-size="18"
        font-weight="600"
        letter-spacing="3"
        fill="#d0d7e2">
    DOMÓTICA &amp; SMART HOME
  </text>
</svg>
